<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <!-- Prevent flash of wrong theme -->
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>

  <!-- ── Background Slideshow ── -->
  <div class="bg-slideshow" aria-hidden="true">
    <div class="bg-slide active" style="background-image:url('{{ site.baseurl }}/Figures/R26E%20Front%20View.png')"></div>
    <div class="bg-slide"        style="background-image:url('{{ site.baseurl }}/Figures/R26E%20Iso%20View.png')"></div>
    <div class="bg-slide"        style="background-image:url('{{ site.baseurl }}/Figures/R26E%20Rear%20View.png')"></div>
    <div class="bg-slide"        style="background-image:url('{{ site.baseurl }}/Figures/R26E%20Top%20View.png')"></div>
  </div>
  <div class="bg-overlay"></div>

  <!-- ── Mobile backdrop ── -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- ── Sidebar ── -->
  <nav class="sidebar" id="sidebar" aria-label="Site navigation">
    <div class="sidebar-brand">NUS Formula SAE</div>
    <ul class="nav-links">
      <li><a href="{{ site.baseurl }}/">Home</a></li>
      <li><a href="{{ site.baseurl }}/list-of-abbrev">Abbreviations</a></li>
      <li><a href="{{ site.baseurl }}/introduction">1. Introduction</a></li>
      <li><a href="{{ site.baseurl }}/objective-and-scope">2. Objective &amp; Scope</a></li>
      <li><a href="{{ site.baseurl }}/context-of-problem">3. Context of Problem</a></li>
      <li><a href="{{ site.baseurl }}/r25evo">4. R25Evo</a></li>
      <li><a href="{{ site.baseurl }}/pcdc-optimization">5. PCDC Optimization</a></li>
      <li><a href="{{ site.baseurl }}/tb-pdm-verification">6. TB PDM Verification</a></li>
      <li><a href="{{ site.baseurl }}/hv-distribution-testing">7. HV Distribution PCB</a></li>
      <li><a href="{{ site.baseurl }}/shortcomings">8. Shortcomings</a></li>
      <li><a href="{{ site.baseurl }}/future-work">9. Future Work</a></li>
      <li><a href="{{ site.baseurl }}/references">10. References</a></li>
      <li><a href="{{ site.baseurl }}/appendix">11. Appendix</a></li>
    </ul>
  </nav>

  <!-- ── Top Bar ── -->
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" onclick="toggleSidebar()" aria-label="Toggle navigation" title="Toggle sidebar">&#9776;</button>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search report…" autocomplete="off"
             oninput="doSearch(this.value)" onfocus="doSearch(this.value)" aria-label="Search">
      <div class="search-results" id="searchResults" role="listbox"></div>
    </div>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle light/dark mode">☀️</button>
  </header>

  <!-- ── Page Content ── -->
  <main class="main-content" id="mainContent">
    <div class="content-card">
      {{ content }}
    </div>
  </main>

  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
